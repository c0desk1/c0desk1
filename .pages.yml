# ==========================================
# 1. MEDIA CONFIG
# ==========================================
media:
  - name: images
    label: Gallery Media
    input: public/images
    output: /images
    rename: safe
    categories: [image]
    extensions: [png, jpg, webp, svg]
    commit:
      templates:
        create: "meta(media): upload {filename}"
        delete: "meta(media): delete {filename}"

  - name: blog-images
    label: Blog Images
    input: public/images/blog
    output: /images/blog
    categories: [image]

# ==========================================
# 2. CONTENT COLLECTIONS
# ==========================================
content:
  # --- BLOG ---
  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    filename: "{primary}.mdx"
    
    view:
      primary: title
      sort: [pubDate]
      fields: [title, author, category, pubDate]
      
    fields:
      - name: title
        label: Judul
        type: string
        
      - name: description
        label: Deskripsi
        type: text
        
      - name: image
        label: Cover
        type: object
        fields:
          - name: src
            label: Link
            type: string
            
          - name: alt
            label: Alt
            type: string

          - name: caption
            label: Caption
            type: text
            
      - name: author
        label: Author
        type: reference
        options:
          collection: authors
          value: "{fields.slug}"
          label: "{fields.name}"
        
      - name: category
        label: Kategori
        type: reference
        options:
          collection: categories
          value: "{slug}"
          label: "{fields.name}"
          
      - name: tags
        label: Tags
        type: string
        list: true
        
      - name: pubDate
        label: Tanggal Terbit
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
        
      - name: updatedDate
        label: Tanggal Update
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
        
      - name: draft
        label: Draft
        type: boolean
        
      - name: featured
        label: Unggulan
        type: boolean
        
      - name: seo
        label: SEO
        type: object
        fields:
          - name: title
            label: Judul
            type: string
            
          - name: description
            label: Deskripsi
            type: text
            
          - name: ogImage
            label: OG Cover
            type: string
            
          - name: canonical
            label: Url
            type: string
            
          - name: noIndex
            label: Jangan index halaman?
            type: boolean
            default: false

      - name: body
        label: Konten
        type: rich-text
        options:
          format: markdown
          media: blog-images
          path: public/images/blog
          switcher: true
          rename: safe
        

  # --- PORTFOLIO ---
  - name: portfolio
    label: Portfolio
    type: collection
    path: src/content/portfolio
    filename: "{primary}.mdx"
    view:
      fields: [title, pubDate]
    fields:      
      - name: title
        label: Judul
        type: string
        
      - name: description
        label: Deskripsi
        type: text
        
      - name: image
        label: Cover
        type: object
        fields:
          - name: src
            label: Link
            type: string
            
          - name: alt
            label: Alt
            type: string

          - name: caption
            label: Caption
            type: text
            
      - name: techStack
        label: Tech Stack
        type: string
        list: true
        
      - name: client
        label: Client
        type: string
        
      - name: role
        label: Role
        type: string
        
      - name: duration
        label: Durasi
        type: string
        
      - name: demoUrl
        label: Demo
        type: string
        
      - name: repoUrl
        label: Repo
        type: string
        
      - name: metrics
        label: Metrik
        type: object
        fields:
          - name: performance
            label: Performa
            type: number
            
          - name: accessibility
            label: Aksebilitas
            type: number
            
          - name: seo
            label: SEO
            type: number
            
      - name: challenge
        label: Tantangan
        type: string
        
      - name: solution
        label: Solusi
        type: string
        
      - name: result
        label: Hasil
        type: string
        
      - name: gallery
        label: Gallery
        type: string
        list: true
        
      - name: pubDate
        label: Tanggal Project
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
          
      - name: updatedDate
        label: Tanggal Update
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
          
      - name: draft
        label: Draft
        type: boolean
        default: false
        
      - name: featured
        label: Unggulan
        type: boolean
        default: false
        
      - name: seo
        label: SEO
        type: object
        fields:
          - name: title
            label: Judul
            type: string
            
          - name: description
            label: Deskripsi
            type: text

          - name: ogImage
            label: OG Cover
            type: string
            
          - name: noIndex
            label: Jangan index halaman?
            type: boolean
            default: false

      - name: body
        label: Detail Case
        type: rich-text
        options:
          format: markdown
          media: images
          path: public/images/portfolio
          rename: true

  # --- AUTHORS ---
  - name: authors
    label: Authors
    type: collection
    path: src/content/authors
    filename: "{primary}.json"
    view:
      fields: [name, role]
    fields:
      - name: name
        label: Nama
        type: string

      - name: slug
        label: Slug
        type: string
        default: "bima-akbar"
        
      - name: role
        label: Jabatan
        type: string
        
      - name: avatar
        label: Avatar
        type: string
        
      - name: bio
        label: Bio
        type: text
        
      - name: organization
        label: Organisasi
        type: reference
        options:
          collection: organizations
          value: "{path}"
          label: "{fields.name}"
          
      - name: social
        label: Sosial Media
        type: object
        fields:
          - name: github
            label: Github
            type: string
            
          - name: twitter
            label: X
            type: string
            
          - name: linkedIn
            label: LinkedIn
            type: string
            
          - name: instagram
            label: Instagram
            type: string
            
          - name: youtube
            label: YouTube
            type: string

  # --- CATEGORIES ---
  - name: categories
    label: Categories
    type: collection
    path: src/content/categories
    filename: "{primary}.json"
    view:
      fields: [name, slug]
    fields:
      - name: slug
        label: Slug
        type: string
        pattern: "^[a-z0-9-]+$"
        
      - name: name
        label: Nama Kategori
        type: string
        
      - name: description
        label: Deskripsi
        type: text

  # --- ORGANIZATIONS (Company/Brand) ---
  - name: organizations
    label: Organizations
    type: collection
    path: src/content/organizations
    filename: "{primary}.json"
    view:
      fields: [name]
    fields:
      - name: name
        label: Nama
        type: string
        
      - name: legalName
        label: Nama Legal
        type: string
        
      - name: url
        label: Website
        type: string
        
      - name: logo
        label: Logo
        type: string
        
      - name: contactEmail
        label: Email
        type: string

  # --- SETTINGS (Website Config) ---
  - name: settings
    label: Site Settings
    type: file
    path: src/content/settings/site.json
    view:
      fields: [siteName]
    fields:
      - name: siteName
        label: Nama Site
        type: string
        
      - name: siteDescription
        label: Deskripsi
        type: text
        
      - name: siteUrl
        label: URL
        type: string
        
      - name: siteLogo
        label: Logo
        type: string
        
      - name: siteMail
        label: Email
        type: string
        
      - name: social
        label: Sosial Media
        type: object
        fields:
          - name: github
            label: GitHub
            type: string
            
          - name: twitter
            label: Twitter
            type: string
            
          - name: instagram
            label: Instagram
            type: string
            
          - name: youtube
            label: YouTube
            type: string
            
      - name: navItems
        label: Navigation Menu
        type: object
        list: true
        fields:
          - name: href
            label: URL
            type: string

          - name: label
            label: Label
            type: string
            
      - name: defaultSeo
        label: Default SEO
        type: object
        fields:
          - name: title
            label: Title
            type: string
            
          - name: description
            label: Description
            type: text
            
          - name: ogImage
            label: OG Image
            type: string
            
      - name: googleAnalyticsId
        label: Google Analytics ID
        type: string
        
      - name: googleSiteVerification
        label: Google Site Verification
        type: string
        
      - name: googleAdsenseId
        label: Google Adsense ID
        type: string
        
      - name: yandexVerification
        label: Yandex Verification
        type: string
        
      - name: yandexMetrikaId
        label: Yandex Metrika ID
        type: string