media:
  - name: images
    label: Image
    input: public/images
    output: /images
    rename: safe
    categories: [image]
    extensions: [png, jpg, webp]
    actions:
      - name: optimize-images
        label: Optimize All Images
        workflow: optimize-images.yml
        confirm:
          title: "Optimize Images?"
          message: "Ini akan memproses semua gambar di folder images."
          button: "Ya, Optimize"
          
  - name: blog-author
    label: Authors
    input: public/images/author
    output: /images/author
    categories: [image]

  - name: blog-images
    label: Blog Images
    input: public/images/blog
    output: /images/blog
    categories: [image]

  - name: portfolio-images
    label: Portfolio Images
    input: public/images/portfolio
    output: /images/portfolio
    categories: [image]

content:
  # ==========================================
  # BLOG COLLECTION
  # ==========================================
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{primary}.mdx"
    view:
      fields: [image.src, title, pubDate, draft]
      sort: ["pubDate desc"]
      
    fields:
      - name: title
        label: Judul
        type: string
        required: true
      
      - name: description
        label: Deskripsi
        type: text
        required: true
      
      - name: pubDate
        label: Tanggal Terbit
        type: date
        required: true
        options:
          format: yyyy-MM-dd'T'HH:mm:ssXXX

      - name: image
        label: Cover Image
        type: object
        fields:
          - name: src
            label: Image File
            type: image
            options:
              media: blog-images
          - name: alt
            label: Alt Text
            type: string
            required: true

      - name: author
        label: Author (Reference)
        type: select
        options:
          values: authors

      - name: category
        label: Kategori (Reference)
        type: select
        options:
          values: categories

      - name: tags
        label: Tags
        type: string
        list: true

      - name: draft
        label: Draft Mode
        type: boolean
        default: false

      - name: featured
        label: Featured Post
        type: boolean
        default: false

      - name: seo
        label: SEO Metadata
        type: object
        fields:
          - name: title
            type: string
          - name: description
            type: text
          - name: noIndex
            type: boolean
            default: false

  # ==========================================
  # PORTFOLIO COLLECTION
  # ==========================================
  - name: portfolio
    label: Portfolio Projects
    type: collection
    path: src/content/portfolio
    filename: "{primary}.mdx"
    view:
      fields: [image.src, title, pubDate, featured]
      sort: ["pubDate desc"]
    
    fields:
      - name: title
        label: Project Name
        type: string
        required: true
      
      - name: description
        label: Brief
        type: text
        required: true

      - name: pubDate
        label: Project Date
        type: date
        required: true # Audit: Portfolio wajib pake pubDate sesuai Zod Memory kita
      
      - name: image
        label: Project Cover
        type: object
        fields:
          - name: src
            type: image
            options:
              media: portfolio-images
          - name: alt
            type: string

      - name: techStack
        label: Technologies
        type: string
        list: true

      - name: metrics
        label: Performance (Lighthouse)
        type: object
        fields:
          - name: performance
            type: number
          - name: accessibility
            type: number
          - name: seo
            type: number

      - name: demoUrl
        label: Live Demo
        type: string
      
      - name: repoUrl
        label: Source Code
        type: string

      - name: draft
        label: Draft
        type: boolean
        default: false
