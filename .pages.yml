# ==========================================
# 1. MEDIA CONFIG
# ==========================================
media:
  - name: images
    label: Gallery Media
    input: public/images
    output: /images
    rename: safe
    categories: [image]
    extensions: [png, jpg, webp, svg]
    commit:
      templates:
        create: "meta(media): upload {filename}"
        delete: "meta(media): delete {filename}"

  - name: blog-images
    label: Blog Images
    input: public/images/blog
    output: /images/blog
    categories: [image]

# ==========================================
# 2. CONTENT COLLECTIONS
# ==========================================
content:
  # --- BLOG ---
  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    filename: "{primary}.mdx"
    fields:
      - name: title
        label: Judul
        type: string
        
      - name: description
        label: Deskripsi
        type: text
        
      - name: image
        label: Cover
        type: object
        fields:
          - name: src
            label: Link
            type: string
            
          - name: alt
            label: Alt
            type: string
            
          - name: caption
            label: Caption
            type: text
            
      - name: author
        label: Author
        type: reference
        options:
          collection: authors
          value: "{path}"
          label: "{label}"
          
      - name: category
        label: Kategori
        type: reference
        options:
          collection: categories
          value: "{path}"
          label: "{label}"
          
      - name: tags
        label: Tags
        type: string
        list: true
        
      # --- Metadata Shared ---
      - name: pubDate
        label: Tanggal Terbit
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
        
      - name: updatedDate
        label: Tanggal Update
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
        
      - name: draft
        label: Draft
        type: boolean
        
      - name: featured
        label: Unggulan
        type: boolean
        
      # --- SEO Shared ---
      - name: seo
        label: SEO
        type: object
        fields:
          - name: title
            label: Judul
            type: string
            
          - name: description
            label: Deskripsi
            type: text
            
          - name: ogImage
            label: OG Cover
            type: string
            
          - name: canonical
            label: Url
            type: string
            
          - name: noIndex
            label: Jangan index halaman
            type: boolean
            default: false

      - name: body
        label: Konten
        type: rich-text
        options:
          format: markdown
          media: blog-images
          path: public/images/blog
          switcher: true
          rename: safe
        

  # --- PORTFOLIO ---
  - name: portfolio
    label: Portfolio Projects
    type: collection
    path: src/content/portfolio
    filename: "{primary}.mdx"
    fields:      
      - name: title
        label: Judul
        type: string
        
      - name: description
        label: Deskripsi
        type: text
        
      - name: image
        label: Cover
        type: object
        fields:
          - name: src
            label: Link
            type: string
            
          - name: alt
            label: Alt
            type: string

          - name: caption
            label: Caption
            type: text
            
      - name: techStack
        label: Tech Stack
        type: string
        list: true
      - name: client
        label: Client
        type: string
        
      - name: role
        label: Role
        type: string
        
      - name: duration
        label: Durasi
        type: string
        
      - name: demoUrl
        label: Demo
        type: string
        
      - name: repoUrl
        label: Repo
        type: string
        
      - name: metrics
        label: Metrik
        type: object
        fields:
          - name: performance
            label: Performa
            type: number
            
          - name: accessibility
            label: Aksebilitas
            type: number
            
          - name: seo
            label: SEO
            type: number
            
      - name: challenge
        label: Tantangan
        type: string
        
      - name: solution
        label: Solusi
        type: string
        
      - name: result
        label: Hasil
        type: string
        
      - name: gallery
        label: Gallery
        type: string
        list: true
      # --- Metadata & SEO ---
      - name: pubDate
        label: Tanggal Project
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
          
      - name: updatedDate
        label: Tanggal Update
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
          
      - name: draft
        label: Draft
        type: boolean
        default: false
        
      - name: featured
        label: Unggulan
        type: boolean
        default: false
        
      - name: seo
        label: SEO
        type: object
        fields:
          - name: title
            label: Judul
            type: string
            
          - name: description
            label: Deskripsi
            type: text
            
          - name: noIndex
            label: Jangan index halaman?
            type: boolean
            default: false

      - name: body
        label: Detail Case
        type: rich-text
        options:
          format: markdown
          media: images
          path: public/images/portfolio
          rename: true

  # --- AUTHORS ---
  - name: authors
    label: Authors
    type: collection
    path: src/content/authors
    filename: "{primary}.json"
    fields:
      - name: name
        label: Nama
        type: string
        
      - name: role
        label: Jabatan
        type: string
        
      - name: avatar
        label: Avatar
        type: string
        
      - name: bio
        label: Bio
        type: text
        
      - name: organization
        label: Organisasi
        type: reference
        options:
          collection: organizations
          value: "{path}"
          label: "{label}"
          
      - name: social
        label: Sosial Media
        type: object
        fields:
          - name: github
            label: Github
            type: string
            
          - name: twitter
            label: X
            type: string
            
          - name: linkedin
            label: LinkedIn
            type: string

  # --- CATEGORIES ---
  - name: categories
    label: Categories
    type: collection
    path: src/content/categories
    filename: "{primary}.json"
    fields:
      - name: name
        label: Nama Kategori
        type: string
        
      - name: description
        label: Deskripsi
        type: text
        
      - name: slug
        label: Slug
        type: string
        
      - name: parent
        label: Hubungan
        type: reference
        options:
          collection: categories
          value: "{path}"
          label: "{label}"
          
      - name: seo
        label: SEO
        type: object
        fields:
          - name: title
            label: Judul
            type: string
            
          - name: noIndex
            label: Index
            type: boolean
            default: false

  # --- SETTINGS (ORGANIZATIONS) ---
  - name: organizations
    label: Site Settings
    type: collection
    path: src/content/settings
    filename: "site.json"
    fields:
      - name: name
        label: Nama
        type: string
        
      - name: legalName
        label: Nama Legal
        type: string
        
      - name: url
        label: Website
        type: string
        
      - name: logo
        label: Logo
        type: string
        
      - name: contactEmail
        label: Email
        type: string
        
      - name: socialLinks
        label: Sosial Media
        type: string
        list: true
        
      - name: analyticsId
        label: Analysis ID
        type: string
        
      - name: adsenseId
        label: Adsense ID
        type: string
        