# .pages.yml

# Media configuration
media:
  - name: blog-author
    label: Authors
    input: public/images/author
    output: /images/author
    categories: [image]

  - name: blog-images
    label: Blog Images
    input: public/images/blog
    output: /images/blog
    categories: [image]

  - name: blog-og
    label: Blog OG
    input: public/images/blog/og
    output: /images/blog/og
    categories: [image]
    
  - name: portfolio-images
    label: Portfolio Images
    input: public/images/portfolio
    output: /images/portfolio
    categories: [image]

  - name: portfolio-gallery
    label: Portfolio Gallery
    input: public/images/portfolio/gallery
    output: /images/portfolio/gallery
    categories: [image]

  - name: portfolio-og
    label: Portfolio OG
    input: public/images/portfolio/og
    output: /images/portfolio/og
    categories: [image]
    

# Content collections
content:
  # == BLOG ==
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{primary}.md"
    view:
      fields: [title, pubDate, draft, featured]
      sort: ["pubDate desc"]
    fields:
      - name: title
        label: Title
        type: string
        required: true
        options:
          maxlength: 100
        description: "SEO: Max 100 characters"
      
      - name: description
        label: Description
        type: text
        required: true
        options:
          maxlength: 160
          rows: 3
        description: "Max 160 characters"
      
      - name: pubDate
        label: Publish Date
        type: date
        required: true
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
      
      - name: updatedDate
        label: Updated Date
        type: date
        required: false
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
      
      - name: tags
        label: Tags
        type: string
        list: true
        options:
          max: 5
      
      - name: image
        label: Cover
        type: image
        options:
          media: blog-images
          rename: true
      
      - name: imageAlt
        label: Alt Text
        type: string

      - name: imageCaption
        label: Caption
        type: string

      - name: body
        label: Content
        type: rich-text
        options:
          media: blog-images
          switcher: true
      
      - name: draft
        label: Draft
        type: boolean
        default: false
      
      - name: featured
        label: Featured
        type: boolean
        default: false
      
      - name: author
        label: Author
        type: object
        fields:
          - name: name
            label: Name
            type: string
            default: "C0desk1"
            
          - name: avatar
            label: Avatar
            type: image
            options:
              media: blog-author
              rename: true
            
          - name: title
            label: Title
            type: string
            description: "e.g., Frontend Developer"
      
      - name: seo
        label: SEO
        type: object
        description: "Override default SEO settings"
        fields:
          - name: title
            label: SEO Title
            type: string
            options:
              maxlength: 100
          - name: description
            label: SEO Description
            type: text
            options:
              maxlength: 160
          - name: ogImage
            label: OG Image
            type: image
            options:
              media: blog-og
              rename: true
            

  # ==================== PORTFOLIO COLLECTION ====================
  - name: portfolio
    label: Portfolio Projects
    type: collection
    path: src/content/portfolio
    filename: "{primary}.mdx"
    
    view:
      fields: [title, date, featured, draft]
      sort: ["date desc"]
    
    fields:      
      - name: title
        label: Project Title
        type: string
        required: true
        options:
          maxlength: 80
      
      - name: description
        label: Description
        type: text
        required: true
        options:
          maxlength: 200
          rows: 3
      
      - name: date
        label: Project Date
        type: date
        required: true
        options:
          format: "yyyy-MM-dd"
      
      - name: updatedDate
        label: Updated Date
        type: date
        required: false
        options:
          format: "yyyy-MM-dd"
      
      - name: techStack
        label: Tech Stack
        type: select
        required: true
        options:
          multiple: true
          creatable: true
          min: 1
          max: 10
      
      - name: demoUrl
        label: Demo URL
        type: string
        required: false
        pattern:
          regex: "^https?://"
          message: "Must be a valid URL starting with http:// or https://"
      
      - name: repoUrl
        label: Repository URL
        type: string
        required: false
        pattern:
          regex: "^https?://"
          message: "Must be a valid URL"
      
      - name: image
        label: Cover Image
        type: image
        options:
          media: portfolio-images
      
      - name: imageAlt
        label: Image Alt Text
        type: string
      
      - name: gallery
        label: Gallery Images
        type: image
        required: false
        fields:
          - name: image
            label: Gallery Image
            type: image
            options:
              multiple: true
              media: portfolio-gallery
        description: "Additional project screenshots"
      
      - name: draft
        label: Draft
        type: boolean
        default: false
      
      - name: featured
        label: Featured Project
        type: boolean
        default: false
      
      - name: client
        label: Client Name
        type: string
        required: false
      
      - name: role
        label: Your Role
        type: string
        required: false
      
      - name: duration
        label: Project Duration
        type: string
        required: false
      
      - name: metrics
        label: Performance Metrics
        type: object
        fields:
          - name: performance
            label: Performance Score
            type: number
            options:
              min: 0
              max: 100
          - name: accessibility
            label: Accessibility Score
            type: number
            options:
              min: 0
              max: 100
          - name: seo
            label: SEO Score
            type: number
            options:
              min: 0
              max: 100
      
      - name: challenge
        label: The Challenge
        type: text
        required: false
        options:
          rows: 4
      
      - name: solution
        label: The Solution
        type: text
        required: false
        options:
          rows: 4
      
      - name: result
        label: The Result
        type: text
        required: false
        options:
          rows: 4

  # ==================== SETTINGS COLLECTION ====================
  - name: settings
    label: Site Settings
    type: file
    path: src/content/settings/site.json
    format: json
    
    fields:
      - name: siteName
        label: Site Name
        type: string
        required: true
      
      - name: siteDescription
        label: Description
        type: text
        required: true
      
      - name: socialLinks
        label: Social
        type: object
        fields:
          - name: github
            label: GitHub
            type: string
            pattern:
              regex: "^https?://(github\\.com|www\\.github\\.com)"
              message: "Must be a valid GitHub URL"
          - name: twitter
            label: Twitter
            type: string
            pattern:
              regex: "^https?://(twitter\\.com|x\\.com|www\\.twitter\\.com)"
              message: "Must be a valid Twitter/X URL"
          - name: linkedin
            label: LinkedIn
            type: string
            pattern:
              regex: "^https?://(linkedin\\.com|www\\.linkedin\\.com)"
              message: "Must be a valid LinkedIn URL"
      
      - name: seo
        label: Default SEO Settings
        type: object
        fields:
          - name: title
            label: Default SEO Title
            type: string
          - name: description
            label: Default SEO Description
            type: text
          - name: ogImage
            label: Default OG Image URL
            type: string
          - name: canonical
            label: Default Canonical URL
            type: string
