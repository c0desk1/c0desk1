# .pages.yml

media:
  - name: images
    label: Image
    input: public/images
    output: /images
    rename: safe
    categories: [image]
    extensions: [png, jpg, webp]
    actions:
      - name: optimize-images
        label: Optimize All Images
        workflow: optimize-images.yml
        confirm:
          title: "Optimize Images?"
          message: "Ini akan memproses semua gambar di folder images."
          button: "Ya, Optimize"
          
  - name: blog-author
    label: Authors
    input: public/images/author
    output: /images/author
    categories: [image]

  - name: blog-images
    label: Blog Images
    input: public/images/blog
    output: /images/blog
    categories: [image]

  - name: blog-og
    label: Blog OG
    input: public/images/blog/og
    output: /images/blog/og
    categories: [image]
    
  - name: portfolio-images
    label: Portfolio Images
    input: public/images/portfolio
    output: /images/portfolio
    categories: [image]

  - name: portfolio-gallery
    label: Portfolio Gallery
    input: public/images/portfolio/gallery
    output: /images/portfolio/gallery
    categories: [image]

  - name: portfolio-og
    label: Portfolio OG
    input: public/images/portfolio/og
    output: /images/portfolio/og
    categories: [image]


    
content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{primary}.md"
    view:
      fields: [image, title, pubDate, draft, featured]
      sort: ["pubDate desc"]
      
    actions:
      - name: rebuild-blog
        label: Rebuild Blog Index
        scope: collection
        workflow: rebuild-blog.yml
        confirm:
          title: "Rebuild Blog?"
          message: "Ini akan memicu rebuild index blog."
          button: "Ya, Rebuild"
    fields:
      - name: title
        label: Judul
        type: string
        required: true
        options:
          maxlength: 100
      
      - name: description
        label: Deskripsi
        type: text
        required: true
        options:
          maxlength: 160
          rows: 3
      
      - name: pubDate
        label: Tanggal
        type: date
        required: true
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
      
      - name: updatedDate
        label: Tanggal diperbarui
        type: date
        required: false
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
      
      - name: tags
        label: Tags
        type: string
        list: true
        options:
          max: 5
      
      - name: image
        label: Cover
        type: image
        options:
          media: blog-images
          rename: true
      
      - name: imageAlt
        label: Cover Alt
        type: string

      - name: imageCaption
        label: Cover Caption
        type: string

      - name: body
        label: Konten
        type: rich-text
        options:
          media: blog-images
          switcher: true
      
      - name: draft
        label: Draft
        type: boolean
        default: false
      
      - name: featured
        label: Unggulan
        type: boolean
        default: false
      
      - name: author
        label: Author
        type: object
        fields:
          - name: name
            label: Nama
            type: string
            default: "c0desk1"
            
          - name: avatar
            label: Avatar
            type: image
            options:
              media: blog-author
              rename: true
            
          - name: title
            label: Deskripsi
            type: string
      
      - name: seo
        label: SEO
        type: object
        fields:
          - name: title
            label: Judul
            type: string
            options:
              maxlength: 100
          - name: description
            label: Deskripsi
            type: text
            options:
              maxlength: 160
          - name: ogImage
            label: Gambar OG
            type: image
            options:
              media: blog-og
              rename: true
            

  - name: portfolio
    label: Portfolio Projects
    type: collection
    path: src/content/portfolio
    filename: "{primary}.mdx"
    
    view:
      fields: [title, date, featured, draft]
      sort: ["date desc"]
    
    fields:      
      - name: title
        label: Judul
        type: string
        required: true
        options:
          maxlength: 80
      
      - name: description
        label: Deskripsi
        type: text
        required: true
        options:
          maxlength: 200
          rows: 3
      
      - name: date
        label: Tanggal
        type: date
        required: true
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
      
      - name: updatedDate
        label: Tanggal diperbarui
        type: date
        required: false
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
      
      - name: techStack
        label: Tech Stack
        type: string
        list: true
        options:
          min: 1
          max: 10
      
      - name: demoUrl
        label: Demo URL
        type: string
        required: false
      
      - name: repoUrl
        label: Repository URL
        type: string
        required: false
      
      - name: image
        label: Cover
        type: image
        options:
          media: portfolio-images
      
      - name: imageAlt
        label: Cover Alt
        type: string
        
      - name: imageCaption
        label: Cover Caption
        type: string
      
      - name: gallery
        label: Gambar Gallery
        type: image
        required: false
        fields:
          - name: image
            label: Gallery Image
            type: image
            options:
              multiple: true
              media: portfolio-gallery
      
      - name: draft
        label: Draft
        type: boolean
        default: false
      
      - name: featured
        label: Unggulan
        type: boolean
        default: false
      
      - name: client
        label: Client
        type: string
        required: false
      
      - name: role
        label: Aturan
        type: string
        required: false
      
      - name: duration
        label: Durasi
        type: string
        required: false
      
      - name: metrics
        label: Performance
        type: object
        fields:
          - name: performance
            label: Performa
            type: number
            options:
              min: 0
              max: 100
          - name: accessibility
            label: Aksebilitas
            type: number
            options:
              min: 0
              max: 100
          - name: seo
            label: SEO
            type: number
            options:
              min: 0
              max: 100
      
      - name: challenge
        label: Tantangan
        type: text
        required: false
        options:
          rows: 4
      
      - name: solution
        label: The Solution
        type: text
        required: false
        options:
          rows: 4
      
      - name: result
        label: Hasil
        type: text
        required: false
        options:
          rows: 4

actions:
  - name: deploy
    label: 🚀 Deploy to Cloudflare
    workflow: manual-deploy.yml
    ref: current
    cancelable: true
    confirm:
      title: "Deploy Website?"
      message: "Apakah Anda yakin ingin melakukan deploy ulang?"
      button: "Ya, Deploy!"
    fields:
      - name: environment
        label: Environment
        type: select
        required: true
        default: production
        options:
          - label: Production
            value: production
          - label: Preview
            value: preview
