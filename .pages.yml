# ==========================================
# 1. MEDIA CONFIG
# ==========================================
media:
  - name: images
    label: Local Backup
    input: public/images
    output: /images
    rename: safe
    categories: [image]
    extensions: [png, jpg, webp, svg]
    commit:
      templates:
        create: "meta(media): upload {filename}"
        delete: "meta(media): delete {filename}"

  - name: blog-images
    label: Blog Images
    input: public/images/blog
    output: /images/blog
    categories: [image]

# ==========================================
# 2. CONTENT COLLECTIONS (SYNCED TO ZOD)
# ==========================================
content:
  # --- BLOG ---
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{primary}.mdx"
    fields:
      - name: title
        label: Judul
        type: string
      - name: description
        label: Deskripsi
        type: text
      - name: image
        label: Featured Image
        type: object
        fields:
          - name: src
            type: string
          - name: alt
            type: string
      - name: author
        label: Author
        type: reference
        options:
          collection: authors
          value: "{path}"
          label: "{name}"
      - name: category
        label: Kategori
        type: reference
        options:
          collection: categories
          value: "{path}"
          label: "{name}"
      - name: tags
        label: Tags
        type: string
        list: true
      # --- Metadata Shared ---
      - name: pubDate
        label: Tanggal Terbit
        type: date
      - name: updatedDate
        label: Tanggal Update
        type: date
      - name: draft
        label: Draft Mode
        type: boolean
      - name: featured
        label: Unggulan
        type: boolean
      # --- SEO Shared ---
      - name: seo
        label: SEO Settings
        type: object
        fields:
          - name: title
            type: string
          - name: description
            type: text
          - name: ogImage
            type: string
          - name: canonical
            type: string
          - name: noIndex
            type: boolean

  # --- PORTFOLIO ---
  - name: portfolio
    label: Portfolio Projects
    type: collection
    path: src/content/portfolio
    filename: "{primary}.mdx"
    fields:      
      - name: title
        type: string
      - name: description
        type: text
      - name: image
        type: object
        fields:
          - name: src
            type: string
          - name: alt
            type: string
      - name: techStack
        label: Tech Stack
        type: string
        list: true
      - name: client
        type: string
      - name: role
        type: string
      - name: duration
        type: string
      - name: demoUrl
        type: string
      - name: repoUrl
        type: string
      - name: metrics
        type: object
        fields:
          - name: performance
            type: number
          - name: accessibility
            type: number
          - name: seo
            type: number
      - name: challenge
        type: string
      - name: solution
        type: string
      - name: result
        type: string
      - name: gallery
        type: string
        list: true
      # --- Metadata & SEO ---
      - name: pubDate
        type: date
      - name: updatedDate
        type: date
      - name: draft
        type: boolean
      - name: featured
        type: boolean
      - name: seo
        type: object
        fields:
          - name: title
            type: string
          - name: description
            type: text
          - name: noIndex
            type: boolean

  # --- AUTHORS ---
  - name: authors
    label: Authors
    type: collection
    path: src/content/authors
    filename: "{primary}.json"
    fields:
      - name: name
        type: string
      - name: role
        type: string
      - name: avatar
        type: string
      - name: bio
        type: text
      - name: organization
        label: Organization
        type: reference
        options:
          collection: organizations
          value: "{path}"
          label: "{name}"
      - name: social
        type: object
        fields:
          - name: github
            type: string
          - name: twitter
            type: string
          - name: linkedin
            type: string

  # --- CATEGORIES ---
  - name: categories
    label: Categories
    type: collection
    path: src/content/categories
    filename: "{primary}.json"
    fields:
      - name: name
        type: string
      - name: description
        type: text
      - name: slug
        type: string
      - name: parent
        type: reference
        options:
          collection: categories
          value: "{path}"
          label: "{name}"
      - name: seo
        type: object
        fields:
          - name: title
            type: string
          - name: noIndex
            type: boolean

  # --- SETTINGS (ORGANIZATIONS) ---
  - name: organizations
    label: Site Settings
    type: collection
    path: src/content/settings
    filename: "site.json"
    fields:
      - name: name
        type: string
      - name: legalName
        type: string
      - name: url
        type: string
      - name: logo
        type: string
      - name: contactEmail
        type: string
      - name: socialLinks
        type: string
        list: true
      - name: analyticsId
        type: string
      - name: adsenseId
        type: string
        