<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"><style>
    .bg { fill: none; }
    .icon { stroke: #ffffff; fill: none; stroke-width: 4; stroke-linecap: butt; stroke-linejoin: round; }
    
    @media (prefers-color-scheme: dark) {
      .bg { fill: none; }
      .icon { stroke: #18181b; fill: none; stroke-width: 4; stroke-linecap: butt; stroke-linejoin: round; }
    }
  </style><circle cx="16" cy="16" r="16" class="bg"></circle><circle cx="16" cy="16" r="10" class="icon"></circle><line x1="5" y1="27" x2="27" y2="5" class="icon"></line><style>@media (prefers-color-scheme: light) { :root { filter: none; } }
@media (prefers-color-scheme: dark) { :root { filter: invert(100%); } }
</style></svg>
