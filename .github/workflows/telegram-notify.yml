- name: Parse & Send to Telegram
  if: steps.changed.outputs.any_changed == 'true'
  env:
    TG_ENGINE_URL: ${{ secrets.TG_ENGINE_URL }}
    TG_ENGINE_ADMIN_TOKEN: ${{ secrets.TG_ENGINE_ADMIN_TOKEN }}
    FILES: ${{ steps.changed.outputs.all_changed_files }}
  shell: bash
  run: |
    set -eo pipefail

    echo "📄 Changed files:"
    echo "$FILES"

    for FILE in $FILES; do
      echo ""
      echo "--- Processing: $FILE ---"

      # =========================
      # 1. Skip jika file tidak ada
      # =========================
      if [ ! -f "$FILE" ]; then
        echo "⚠️ Skip: file deleted or not found"
        continue
      fi

      # =========================
      # 2. Tentukan tipe konten
      # =========================
      if [[ "$FILE" == *"/blog/"* ]]; then
        TYPE="Blog Post"
        BASE_PATH="blog"
      else
        TYPE="Project"
        BASE_PATH="portfolio"
      fi

      # =========================
      # 3. Extract frontmatter (robust)
      # =========================
      FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$FILE" | sed '1d;$d' | tr -d '\r')

      if [ -z "$FRONTMATTER" ]; then
        echo "⚠️ Skip: No valid frontmatter"
        continue
      fi

      echo "----- FRONTMATTER -----"
      echo "$FRONTMATTER"
      echo "------------------------"

      # =========================
      # 4. Parse YAML pakai yq
      # =========================
      TITLE=$(echo "$FRONTMATTER" | yq -r '.title // empty')
      DESC=$(echo "$FRONTMATTER" | yq -r '.description // .synopsis // empty')
      RAW_IMAGE=$(echo "$FRONTMATTER" | yq -r '.image // ""')

      SLUG=$(basename "$FILE" | sed -E 's/\.(md|mdx)$//')
      URL="https://c0desk1.my.id/$BASE_PATH/$SLUG"

      # =========================
      # 5. Validasi field WAJIB
      # =========================
      if [ -z "$TITLE" ] || [ "$TITLE" = "null" ]; then
        echo "⚠️ Skip: TITLE empty"
        continue
      fi

      if [ -z "$DESC" ] || [ "$DESC" = "null" ]; then
        echo "⚠️ Skip: DESCRIPTION empty"
        continue
      fi

      echo "TYPE=$TYPE"
      echo "TITLE=$TITLE"
      echo "DESC=$DESC"
      echo "URL=$URL"

      # =========================
      # 6. Extract fileId (optional)
      # =========================
      FILE_ID=$(echo "$RAW_IMAGE" | grep -oE '[A-Za-z0-9_-]{25,}' | head -1 || true)

      if [[ "$FILE_ID" == "image:" ]]; then
        FILE_ID=""
      fi

      echo "FILE_ID=$FILE_ID"

      # =========================
      # 7. Build JSON payload
      # =========================
      JSON_PAYLOAD=$(jq -n \
        --arg title "[$TYPE] $TITLE" \
        --arg description "$DESC" \
        --arg url "$URL" \
        --arg fileId "$FILE_ID" \
        '
        {
          title: $title,
          description: $description,
          url: $url
        } + (if $fileId != "" then {fileId: $fileId} else {} end)
        ')

      echo "📦 JSON_PAYLOAD:"
      echo "$JSON_PAYLOAD"

      # =========================
      # 8. Kirim request
      # =========================
      HTTP_RESPONSE=$(curl -sS -w "\n%{http_code}" \
        -X POST "$TG_ENGINE_URL/api/v1/broadcast" \
        -H "Authorization: Bearer $TG_ENGINE_ADMIN_TOKEN" \
        -H "Content-Type: application/json" \
        -d "$JSON_PAYLOAD")

      HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
      HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)

      echo "📨 Response Body:"
      echo "$HTTP_BODY"
      echo "📨 HTTP_CODE: $HTTP_CODE"

      # =========================
      # 9. Error handling
      # =========================
      if [[ "$HTTP_CODE" != "200" ]]; then
        echo "::error::Request failed for $FILE with code $HTTP_CODE"
        exit 1
      fi

      sleep 1
    done