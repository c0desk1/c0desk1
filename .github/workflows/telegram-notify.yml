name: Telegram Notification

on:
  push:
    branches: 
    paths:
      - 'src/content/blog/**/*.md'
      - 'src/content/blog/**/*.mdx'
      - 'src/content/portfolio/**/*.md'
      - 'src/content/portfolio/**/*.mdx'

concurrency:
  group: telegram-notify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47.0.6
        with:
          files: |
            src/content/blog/**/*.md
            src/content/blog/**/*.mdx
            src/content/portfolio/**/*.md
            src/content/portfolio/**/*.mdx

      - name: Parse & Send to Telegram
        if: steps.changed.outputs.any_changed == 'true'
        env:
          TG_ENGINE_URL: ${{ secrets.TG_ENGINE_URL }}
          TG_ENGINE_ADMIN_TOKEN: ${{ secrets.TG_ENGINE_ADMIN_TOKEN }}
          FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          echo "📄 Changed files:"
          echo "$FILES"

          for FILE in $FILES; do
            echo "--- Processing: $FILE ---"

            if [ ! -f "$FILE" ]; then
              echo "Skip: file deleted or not found"
              continue
            fi

            if [[ "$FILE" == *"/blog/"* ]]; then
              TYPE="Blog Post"
              BASE_PATH="blog"
            else
              TYPE="Project"
              BASE_PATH="portfolio"
            fi

            # Ambil frontmatter pake awk, lebih aman buat .mdx
            FRONTMATTER=$(awk '/^---$/{if(f) exit; f=1; next} f' "$FILE")

            if [ -z "$FRONTMATTER" ]; then
              echo "Skip: No frontmatter found in $FILE"
              continue
            fi

            TITLE=$(echo "$FRONTMATTER" | yq -r '.title // empty')
            DESC=$(echo "$FRONTMATTER" | yq -r '.description // .synopsis // empty')
            RAW_IMAGE=$(echo "$FRONTMATTER" | yq -r '.image // ""')
            SLUG=$(basename "$FILE" | sed -E 's/\.(md|mdx)$//')
            URL="https://c0desk1.my.id/$BASE_PATH/$SLUG"

            # Skip kalo title atau desc kosong karena API lu wajib
            if [ -z "$TITLE" ]; then
              echo "Skip: TITLE empty in $FILE"
              continue
            fi
            
            if [ -z "$DESC" ]; then
              echo "Skip: DESCRIPTION empty in $FILE"
              continue
            fi

            FILE_ID=$(echo "$RAW_IMAGE" | grep -oE '[A-Za-z0-9_-]{25,}' | head -1 || true)
            [[ "$FILE_ID" == "image:" ]] && FILE_ID=""

            echo "TYPE=$TYPE"
            echo "TITLE=$TITLE"
            echo "DESC=$DESC"
            echo "URL=$URL"
            echo "FILE_ID=$FILE_ID"

            JSON_PAYLOAD=$(jq -n \
              --arg title "[$TYPE] $TITLE" \
              --arg description "$DESC" \
              --arg url "$URL" \
              --arg fileId "$FILE_ID" \
              '{title: $title, description: $description, url: $url} + 
              (if $fileId != "" then {fileId: $fileId} else {} end)')

            echo "JSON_PAYLOAD: $JSON_PAYLOAD"
            echo "🚀 Sending..."

            HTTP_RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "$TG_ENGINE_URL/api/v1/broadcast" \
              -H "Authorization: Bearer $TG_ENGINE_ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$JSON_PAYLOAD")
            
            HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
            HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
            
            echo "Response: $HTTP_BODY"
            echo "HTTP_CODE: $HTTP_CODE"
            
            if [[ "$HTTP_CODE" != "200" ]]; then
              echo "::error::Request failed for $FILE with code $HTTP_CODE"
            else
              echo "Success: $FILE sent to Telegram"
            fi

            sleep 1
          done