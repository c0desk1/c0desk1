name: Telegram Notification

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/blog/**/*.md'
      - 'src/content/blog/**/*.mdx'
      - 'src/content/portfolio/**/*.md'
      - 'src/content/portfolio/**/*.mdx'

concurrency:
  group: telegram-notify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files: |
            src/content/blog/**/*.md
            src/content/blog/**/*.mdx
            src/content/portfolio/**/*.md
            src/content/portfolio/**/*.mdx

      - name: Parse & Send to Telegram
        if: steps.changed.outputs.any_changed == 'true'
        env:
          TG_ENGINE_URL: ${{ secrets.TG_ENGINE_URL }}
          TG_ENGINE_ADMIN_TOKEN: ${{ secrets.TG_ENGINE_ADMIN_TOKEN }}
          FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          set -eo pipefail

          echo "$FILES"

          for FILE in $FILES; do
            echo "--- Processing: $FILE ---"

            if [ ! -f "$FILE" ]; then
              echo "Skip: file not found"
              continue
            fi

            if [[ "$FILE" == *"/blog/"* ]]; then
              TYPE="Blog Post"
              BASE_PATH="blog"
            else
              TYPE="Project"
              BASE_PATH="portfolio"
            fi

            FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$FILE" | sed '1d;$d' | tr -d '\r')

            TITLE=$(echo "$FRONTMATTER" | yq -r '.title // empty')
            DESC=$(echo "$FRONTMATTER" | yq -r '.description // .synopsis // empty')

            SLUG=$(basename "$FILE" | sed -E 's/\.(md|mdx)$//')
            URL="https://c0desk1.my.id/$BASE_PATH/$SLUG"

            if [ -z "$TITLE" ] || [ -z "$DESC" ]; then
              echo "Skip: missing fields"
              continue
            fi

            JSON=$(jq -n \
              --arg title "[$TYPE] $TITLE" \
              --arg description "$DESC" \
              --arg url "$URL" \
              '{title:$title, description:$description, url:$url}')

            curl -X POST "$TG_ENGINE_URL/api/v1/broadcast" \
              -H "Authorization: Bearer $TG_ENGINE_ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$JSON"

            sleep 1
          done