name: Telegram Notification

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/blog/**/*.md'
      - 'src/content/blog/**/*.mdx'
      - 'src/content/portfolio/**/*.md'
      - 'src/content/portfolio/**/*.mdx'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changed content
        id: detect
        run: |
          echo "🔍 Detecting changed files..."

          CHANGED_FILES=$(git diff --name-only \
            ${{ github.event.before }} \
            ${{ github.sha }} \
            | grep -E 'src/content/(blog|portfolio)/.*\.(md|mdx)' || true)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          FIRST_FILE=$(echo "$CHANGED_FILES" | head -n 1)

          if [ -z "$FIRST_FILE" ]; then
            echo "No relevant content changes detected."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found file: $FIRST_FILE"

          echo "file=$FIRST_FILE" >> $GITHUB_OUTPUT
          echo "found=true" >> $GITHUB_OUTPUT


      - name: Extract metadata
		if: steps.detect.outputs.found == 'true'
		id: meta
		run: | FILE="${{ steps.detect.outputs.file }}"
				
			echo "📄 Reading file: $FILE"
			if [[ "$FILE" == *"blog"* ]]; then
			TYPE="Blog Post"
			BASE_PATH="blog"
			else
				TYPE="Project"
				BASE_PATH="portfolio"
			fi

    TITLE=$(grep '^title:' "$FILE" | head -1 \
      | sed 's/title: //;s/"//g;s/'\''//g')

    DESC=$(grep -E '^(description|synopsis):' "$FILE" | head -1 \
      | sed -E 's/^(description|synopsis): //;s/"//g;s/'\''//g')

    # ===== FIX IMAGE PARSING =====
    RAW_IMAGE=$(grep '^image:' "$FILE" | head -1 \
      | sed 's/image: //;s/"//g;s/'\''//g')

    FILE_ID=$(echo "$RAW_IMAGE" | grep -oE '[^/]+$' || true)

    if [[ -z "$FILE_ID" || "$FILE_ID" == "image:" ]]; then
      FILE_ID=""
    fi

    if [[ -n "$FILE_ID" && ! "$FILE_ID" =~ ^[A-Za-z0-9_-]{10,}$ ]]; then
      FILE_ID=""
    fi
    # ============================

    SLUG=$(basename "$FILE" \
      | sed -E 's/\.(md|mdx)$//')

    URL="https://c0desk1.my.id/$BASE_PATH/$SLUG"

    echo "TYPE=$TYPE"
    echo "TITLE=$TITLE"
    echo "DESC=$DESC"
    echo "RAW_IMAGE=$RAW_IMAGE"
    echo "FINAL_FILE_ID=$FILE_ID"
    echo "URL=$URL"

    echo "type=$TYPE" >> $GITHUB_OUTPUT
    echo "title=$TITLE" >> $GITHUB_OUTPUT
    echo "desc=$DESC" >> $GITHUB_OUTPUT
    echo "fileId=$FILE_ID" >> $GITHUB_OUTPUT
    echo "url=$URL" >> $GITHUB_OUTPUT


      - name: Send to Telegram
        if: steps.detect.outputs.found == 'true'
        run: |
          echo "🚀 Sending Telegram notification..."

          curl -X POST "${{ secrets.TG_ENGINE_URL }}/api/v1/broadcast" \
            -H "Authorization: Bearer ${{ secrets.TG_ENGINE_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"[${{ steps.meta.outputs.type }}] ${{ steps.meta.outputs.title }}\",
              \"description\": \"${{ steps.meta.outputs.desc }}\",
              \"url\": \"${{ steps.meta.outputs.url }}\",
              \"fileId\": \"${{ steps.meta.outputs.fileId }}\"
            }"