name: Telegram Notification

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**/*.md'
      - 'src/content/blog/**/*.mdx'
      - 'src/content/portfolio/**/*.md'
      - 'src/content/portfolio/**/*.mdx'

concurrency:
  group: telegram-notify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files: |
            src/content/blog/**/*.md
            src/content/blog/**/*.mdx
            src/content/portfolio/**/*.md
            src/content/portfolio/**/*.mdx

      - name: Parse & Send to Telegram
        if: steps.changed.outputs.any_changed == 'true'
        env:
          TG_ENGINE_URL: ${{ secrets.TG_ENGINE_URL }}
          TG_ENGINE_ADMIN_TOKEN: ${{ secrets.TG_ENGINE_ADMIN_TOKEN }}
          FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          echo "📄 Changed files:"
          echo "$FILES"

          for FILE in $FILES; do
            echo "--- Processing: $FILE ---"

            [! -f "$FILE" ] && echo "Skip: file deleted" && continue

            if [[ "$FILE" == *"/blog/"* ]]; then
              TYPE="Blog Post"
              BASE_PATH="blog"
            else
              TYPE="Project"
              BASE_PATH="portfolio"
            fi

            FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$FILE" | sed '1d;$d')

            TITLE=$(echo "$FRONTMATTER" | yq -r '.title // "Untitled"')
            DESC=$(echo "$FRONTMATTER" | yq -r '.description //.synopsis // ""')
            RAW_IMAGE=$(echo "$FRONTMATTER" | yq -r '.image // ""')
            SLUG=$(basename "$FILE" | sed -E 's/\.(md|mdx)$//')
            URL="https://c0desk1.my.id/$BASE_PATH/$SLUG"

            IMAGE_URL=""
            FILE_ID=""

            if [[ "$RAW_IMAGE" =~ ^https?:// ]]; then
              IMAGE_URL="$RAW_IMAGE"
            fi

            FILE_ID=$(echo "$RAW_IMAGE" | grep -oE '[A-Za-z0-9_-]{25,}' | head -1 || true)
            [[ "$FILE_ID" == "image:" ]] && FILE_ID=""

            echo "TYPE=$TYPE | TITLE=$TITLE | URL=$URL"

            JSON_PAYLOAD=$(jq -n \
              --arg title "[$TYPE] $TITLE" \
              --arg desc "$DESC" \
              --arg url "$URL" \
              --arg imageUrl "$IMAGE_URL" \
              --arg fileId "$FILE_ID" \
              '{title: $title, description: $desc, url: $url, imageUrl: $imageUrl, fileId: $fileId}')

            echo "🚀 Sending..."
            curl -sS -X POST "$TG_ENGINE_URL/api/v1/broadcast" \
              -H "Authorization: Bearer $TG_ENGINE_ADMIN_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$JSON_PAYLOAD"

            echo "Status: $?"
            sleep 1
          done
