name: Rebuild Blog Index

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'Pages CMS payload'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate blog index
        run: npm run build:index

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: rebuild blog index [skip ci]"
          git push
